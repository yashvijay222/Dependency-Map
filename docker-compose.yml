services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      USE_CELERY: "true"
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: celery -A app.celery_app:celery_app worker -l info -Q celery,snapshot
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      USE_CELERY: "true"
    depends_on:
      - redis

  worker-cpg:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: celery -A app.celery_app:celery_app worker -l info -Q cpg_heavy --concurrency=2
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      USE_CELERY: "true"
    depends_on:
      - redis

  worker-ml:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: celery -A app.celery_app:celery_app worker -l info -Q ml --concurrency=1
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      USE_CELERY: "true"
    depends_on:
      - redis

  beat:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: celery -A app.celery_app:celery_app beat -l info --schedule=/tmp/celerybeat-schedule
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      USE_CELERY: "true"
    depends_on:
      - redis

volumes:
  redis_data:
