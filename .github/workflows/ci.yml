name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: anon_key_for_ci_build_only
      - name: Frontend tests
        run: npm run test --workspace frontend -- --run

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Sync
        run: uv sync --extra dev
      - name: Ruff
        run: uv run ruff check app
      - name: Import check
        run: uv run python -c "from app.main import app"
      - name: Pytest
        run: uv run pytest tests/ -q
      - name: CPG offline smoke (heuristic ranker)
        run: |
          export CPG_RANKER_BACKEND=heuristic
          export CPG_REASONER_PROVIDER=stub
          uv run python -m cpg_builder.main score --repo .. --out-dir /tmp/cpg-ci-score
